<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ดาวส่องดวง</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="readingEyebrow">รูปแบบที่ 1</p>
          <h1 id="readingTitle">เปิดไพ่ไม่ระบุจำนวน</h1>
        </div>
        <strong class="app-title">
          <img src="logo-dao-song-duang.png" alt="" />
          <span>ไพ่ดาวส่องดวง</span>
        </strong>
        <div class="header-actions">
          <nav class="reading-menu" aria-label="เลือกรูปแบบการทำนาย">
            <button class="menu-button" id="freeReadingButton" type="button">X ใบ</button>
            <button class="menu-button" id="birthReadingButton" type="button">12 ใบ</button>
            <button class="menu-button" id="birthDoubleReadingButton" type="button">24 ใบ</button>
            <button class="menu-button" id="astroReadingButton" type="button">โหราศาสตร์ไทย</button>
          </nav>
          <button class="clear-button" id="clearButton" type="button">ล้างไพ่</button>
        </div>
      </header>

      <section class="table-layout">
        <section class="card-frame teacher-frame" aria-labelledby="teacherTitle">
          <div class="frame-header">
            <h2 id="teacherTitle">ไพ่ครู</h2>
          </div>
          <div class="teacher-stack" aria-label="ไพ่ครู">
            <div class="teacher-card">
              <img src="ไพ่ครู 2.jpg" alt="ไพ่ครู 2" />
              <span>ไพ่ครู 2</span>
            </div>
            <div class="teacher-card">
              <img src="ไพ่ครู 3.jpg" alt="ไพ่ครู 3" />
              <span>ไพ่ครู 3</span>
            </div>
            <div class="teacher-card">
              <img src="ไพ่ครู 4.jpg" alt="ไพ่ครู 4" />
              <span>ไพ่ครู 4</span>
            </div>
            <div class="teacher-card">
              <img src="ไพ่ครู 5.jpg" alt="ไพ่ครู 5" />
              <span>ไพ่ครู 5</span>
            </div>
          </div>
        </section>

        <section class="reading-board" id="readingBoard">
          <section class="card-frame draw-frame" id="drawFrame" aria-labelledby="drawTitle">
            <div class="frame-header">
              <h2 id="drawTitle">กองไพ่</h2>
              <span id="remainingCount">72 ใบ</span>
            </div>
            <div class="deck-grid" id="deckGrid" aria-label="ไพ่สำหรับเลือก"></div>
          </section>

          <section class="card-frame selected-frame" id="selectedFrame" aria-labelledby="selectedTitle">
            <div class="frame-header">
              <h2 id="selectedTitle">ไพ่ที่เปิดแล้ว</h2>
              <span id="selectedCount">0 ใบ</span>
            </div>
            <div class="selected-grid" id="selectedGrid" aria-label="ไพ่ที่เลือกแล้ว"></div>
          </section>
        </section>

        <section class="card-frame birth-spread-frame" id="birthSpreadFrame" hidden aria-labelledby="birthSpreadTitle">
          <div class="frame-header">
            <h2 id="birthSpreadTitle">ผังพื้นชะตา</h2>
            <span>12 เรือน</span>
          </div>
          <div class="birth-spread-grid" id="birthSpreadGrid" aria-label="ผังไพ่พื้นชะตา"></div>
        </section>

        <section class="card-frame astro-input-frame" id="astroInputFrame" hidden aria-labelledby="astroInputTitle">
          <div class="frame-header">
            <h2 id="astroInputTitle">รับค่าราศี</h2>
            <span id="astroInputCount">0/11</span>
          </div>
          <div class="astro-input-grid" id="astroInputGrid" aria-label="รับค่าดาวตามราศี"></div>
        </section>

        <section class="card-frame astro-result-frame" id="astroResultFrame" hidden aria-labelledby="astroResultTitle">
          <div class="frame-header">
            <h2 id="astroResultTitle">ผลโหราศาสตร์ไทย</h2>
            <span id="astroResultStatus">รอข้อมูล</span>
          </div>
          <div class="astro-result-grid" id="astroResultGrid" aria-label="ผลโหราศาสตร์ไทย"></div>
        </section>
      </section>
    </main>

    <div class="card-modal" id="cardModal" hidden>
      <button class="modal-backdrop" id="modalBackdrop" type="button" aria-label="ปิดภาพขยาย"></button>
      <div class="modal-content" role="dialog" aria-modal="true" aria-label="ภาพไพ่ขยาย">
        <button class="modal-close" id="modalClose" type="button" aria-label="ปิด">×</button>
        <button class="modal-print" id="modalPrint" type="button">Print</button>
        <div class="modal-images" id="modalImages"></div>
        <strong id="modalCaption" hidden></strong>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
